name: UltraViewer KeepAlive - Display ID & PASS in Logs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # fallback, nhưng loop sẽ giữ chạy mãi

concurrency:
  group: ultraviewer-keepalive
  cancel-in-progress: false

jobs:
  keep-alive:
    runs-on: windows-2022
    strategy:
      matrix:
        instance: [1]  # tăng [1..20] nếu muốn nhiều parallel
      max-parallel: 20
      fail-fast: false

    timeout-minutes: 0  # vô hạn

    steps:
      - uses: actions/checkout@v4

      - name: Install Python + pywinauto
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          iex ((New-Object Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco install python311 -y --force
          refreshenv
          python -m pip install --upgrade pip pywinauto
          python --version

      - name: Install or Update UltraViewer
        shell: pwsh
        run: |
          $exe = "${env:ProgramFiles(x86)}\UltraViewer\UltraViewer_Desktop.exe"
          if (-Not (Test-Path $exe)) { $exe = "$env:ProgramFiles\UltraViewer\UltraViewer_Desktop.exe" }

          if (-Not (Test-Path $exe)) {
            Write-Output "Installing UltraViewer..."
            Invoke-WebRequest "https://www.ultraviewer.net/vi/UltraViewer_setup_6.6_vi.exe" -OutFile ultra.exe
            Start-Process ultra.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
          } else {
            Write-Output "UltraViewer already installed."
          }

      - name: Loop - Run UltraViewer & Display ID/PASS every 6h
        shell: pwsh
        run: |
          $exe = "${env:ProgramFiles(x86)}\UltraViewer\UltraViewer_Desktop.exe"
          if (-Not (Test-Path $exe)) { $exe = "$env:ProgramFiles\UltraViewer\UltraViewer_Desktop.exe" }

          if (-Not (Test-Path $exe)) {
            Write-Output "UltraViewer exe not found!"
            exit 1
          }

          $refresh = 21600   # 6 hours
          $check_every = 600 # 10 minutes

          while ($true) {
            $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss")
            Write-Output "[$now] Restarting UltraViewer VM-${{ matrix.instance }}"

            # Kill old instances
            Get-Process | Where-Object { $_.Path -like "*UltraViewer_Desktop.exe*" } | Stop-Process -Force -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 5

            Start-Process $exe
            Start-Sleep -Seconds 200  # chờ load UI (tăng nếu chậm)

            # Extract & display
            $script = "$env:GITHUB_WORKSPACE\.github\scripts\extract_ultra.py"
            if (Test-Path $script) {
              python $script
              if (Test-Path "extract_debug.log") {
                Write-Output "=== Extract Debug Log (last 30 lines) ==="
                Get-Content "extract_debug.log" -Tail 30
              }
            } else {
              Write-Output "Extract script not found!"
            }

            Write-Output "----------------------------------------"

            # Hold until next refresh
            $slept = 0
            while ($slept -lt $refresh) {
              Start-Sleep -Seconds $check_every
              $slept += $check_every
              Write-Output "Holding... $slept / $refresh seconds elapsed"
            }
          }
